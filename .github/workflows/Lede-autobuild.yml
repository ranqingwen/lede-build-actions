name: Lede-autobuild

permissions:
  contents: write
  actions: write

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      keep_releases:
        description: '保留的 Release 数量'
        required: false
        default: '2'
        type: string
      keep_workflows:
        description: '保留的 Workflow 运行记录数量'
        required: false
        default: '3'
        type: string
      keep_caches:
        description: '保留的 Cache 数量'
        required: false
        default: '1'
        type: string

# 定时触发开启开始编译(把下面两个#去掉开启,时间设置请看定时开启编译说明)
  schedule:
    - cron: 30 0 * * 4

#分钟字段：30 表示在分钟为UTC时间为30的时候执行，既30分。
#小时字段：0 表示在小时为UTC时间为0的时候执行。北京时间+8，既8点。
#日期字段：* 日期，表示在每月的第几天执行。
#月份字段：* 表示月份，即 1 到 12 月都会匹配。
#星期字段：4 表示匹配周几，如果指定了日期情况下，星期的设置在将不起实际作用。此时为每周4。

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/x86_64.config
  DIY_P1_SH: diy_script/diy-part1.sh
  DIY_P2_SH: diy_script/diy-part2.sh
  FILE_NAME: Lede
  PRODUCT_NAME: x86_64
  CLASH_KERNEL: amd64
  CACHE_TOOLCHAIN: true
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  Lede-2410-autobuild:
    name: 编译Lede_2410_x64
    runs-on: ubuntu-24.04

    steps:
    - name: 检查服务器性能
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo "CPU核心数量: $(nproc)"
        echo -e "CPU型号信息:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息:"
        echo -e "$(sudo lshw -short -C memory | grep GiB)\n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: 密匙检测（密匙为空则退出）
      run: |
        cd ${GITHUB_WORKSPACE}
        if [[ -z "${{ secrets.GH_TOKEN }}" ]]; then
          echo "您没有设置仓库密匙，请按教程设置好密匙再来"
          echo "GH_TOKEN密匙制作教程：https://git.io/jm.md"
          exit 1
        fi

    - name: 最大化构建空间
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 8192
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        
    - name: 检出代码
      uses: actions/checkout@v6.0.2

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d
        sudo bash -c "curl -skL https://raw.githubusercontent.com/sbwml/actions/openwrt-build-setup/sources-24.04.list > /etc/apt/sources.list"
        sudo rm -rf /etc/apt/sources.list.d* /usr/local/lib/android* /etc/docker* /etc/firefox* /etc/mysql* /etc/php* /opt/google* /usr/share/dotnet* /usr/share/google* /usr/share/moby* /usr/share/mysql* /usr/share/php*
        sudo -E apt-get -qq update
        sudo -E apt-get -y purge azure* docker* dotnet* firefox* ghc* google* llvm* mongodb* mysql* php* powershell* snap* gfortran* microsoft-edge-stable
        sudo -E apt-get -qq install $(curl -fsSL raw.githubusercontent.com/Lai-xi/Actions-Lede_x86/main/run)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 强制清理磁盘
      run: |
        sudo rm -rf /mnt/*
        sudo rm -rf /opt/*
        sudo rm -rf /usr/local/*
        df -hT

    - name: 克隆源代码
      # working-directory: $GITHUB_WORKSPACE
      run: |
        df -hT $PWD
        git clone --single-branch --depth=1 --filter=blob:none $REPO_URL -b $REPO_BRANCH $GITHUB_WORKSPACE/openwrt
        echo "OPENWRT_PATH=$GITHUB_WORKSPACE/openwrt" >> $GITHUB_ENV

    - name: 生成变量
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat openwrt/.config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat openwrt/.config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV

    - name: 加载自定义软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新软件源
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装软件源
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        chmod +x $GITHUB_WORKSPACE/diy_script/preset-clash-core.sh
        chmod +x $GITHUB_WORKSPACE/diy_script/preset-openwrt.sh
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        $GITHUB_WORKSPACE/diy_script/preset-clash-core.sh $CLASH_KERNEL
        $GITHUB_WORKSPACE/diy_script/preset-openwrt.sh $CLASH_KERNEL
        
    - name: 编译信息
      run: |
        cd openwrt
        echo "系统空间        类型  总数  已用  可用  使用率"
        df -hT $PWD
        echo
        echo "=========================================="
        grep -i CONFIG_PACKAGE_luci-app .config | grep  -v \# > Plug-in
        grep -i CONFIG_PACKAGE_luci-theme .config | grep  -v \# >> Plug-in
        sed -i '/INCLUDE/d' Plug-in > /dev/null 2>&1
        sed -i 's/CONFIG_PACKAGE_/、/g' Plug-in
        sed -i '/Transparent_Proxy/d' Plug-in > /dev/null 2>&1
        sed -i 's/=y/\ /g' Plug-in
        awk '$0=NR$0' Plug-in > Plug-2
        awk '{print "	" $0}' Plug-2 > Plug-in
        echo
        echo
        echo "	      已选插件列表"
        cat Plug-in
        rm -rf {Plug-in,Plug-2}
        echo
        echo "=========================================="
        echo
        echo
        echo "输出完整插件信息..."
        echo
        echo
        cat .config

    - name: 缓存工具链
      if: env.CACHE_TOOLCHAIN == 'true'
      uses: HiGarfield/cachewrtbuild@main
      with:
        ccache: true
        mixkey: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}
        prefix: ${{ env.OPENWRT_PATH }}

    - name: 下载软件包
      id: package
      run: |
        cd openwrt
        rm -rf tmp
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译前检查磁盘使用情况
      if: (!cancelled())
      run: df -hT

    - name: 开始编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 编译后检查磁盘使用情况
      if: (!cancelled())
      run: |
        echo "=========================================="
        echo "----------------空间使用-------------------"
        echo "=========================================="
        echo "系统空间       类型   总数  已用  可用 使用率"
        df -hT
        echo "=========================================="
        du -h --max-depth=1 openwrt/ --exclude=build_dir --exclude=bin
        du -h --max-depth=1 openwrt/build_dir
        du -h --max-depth=1 openwrt/bin

    - name: 上传 bin 目录
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true' && !cancelled()
      with:
        name: ${{ env.FILE_NAME }}-${{ env.KERNEL }}-bin-${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 准备发布变量
      id: variables
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        # 1. 进入目标目录提取内核版本
        cd openwrt/bin/targets/*/*
        KERNEL_VER=$(cat *.manifest | grep ^kernel | cut -d- -f2 | tr -d ' ')
        echo "KERNEL=$KERNEL_VER" >> $GITHUB_ENV
        
        # 2. 提取默认 IP 地址
        LAN_IP=$(grep "192.168" $GITHUB_WORKSPACE/openwrt/package/base-files/files/bin/config_generate | head -n1 | grep -oE '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}')
        echo "LAN_IP=$LAN_IP" >> $GITHUB_ENV
        
        # 3. 从 diy-part2.sh 提取 build_name (如 24.10)
        BUILD_VER=$(grep "build_name=" $GITHUB_WORKSPACE/${{ env.DIY_P2_SH }} | cut -d'"' -f2)
        echo "BUILD_VER=$BUILD_VER" >> $GITHUB_ENV
        
        # 4. 生成日期和架构 (修改日期格式为 YYYY.MM.DD-HH.mm)
        echo "SHORT_DATE=$(date +%Y.%m.%d-%H.%M)" >> $GITHUB_ENV
        echo "ARCH=x86-64" >> $GITHUB_ENV

    - name: 整理文件
      id: organize
      if: steps.variables.outcome == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        
        # 删除不需要的 rootfs 文件
        rm -f openwrt-x86-64-generic-squashfs-rootfs.img.gz
        
        # 使用新定义的变量重命名 (此时 SHORT_DATE 已经是 04.09-时间 格式)
        mv openwrt-x86-64-generic-squashfs-combined.img.gz ${{ env.FILE_NAME }}-${{ env.BUILD_VER }}-${{ env.KERNEL }}-${{ env.ARCH }}-${{ env.SHORT_DATE }}-bios.img.gz
        mv openwrt-x86-64-generic-squashfs-combined-efi.img.gz ${{ env.FILE_NAME }}-${{ env.BUILD_VER }}-${{ env.KERNEL }}-${{ env.ARCH }}-${{ env.SHORT_DATE }}-uefi.img.gz
        
        # 清理其他杂物
        rm -rf config.buildinfo feeds.buildinfo *.manifest profiles.json version.buildinfo sha256sums packages *.bin
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件目录
      uses: actions/upload-artifact@v4
      if: ${{ env.UPLOAD_FIRMWARE == 'true' && steps.organize.outputs.status == 'success' && !cancelled() }}
      with:
        name: ${{ env.FILE_NAME }}-${{ env.KERNEL }}-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布标签
      id: tag
      if: ${{ env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success' && !cancelled() }}
      run: |
        # 1. 生成唯一的发布标签（带分钟，防止重复）
        release_tag=$(date +"%Y.%m.%d")
        release_date=$(date +"%Y-%m-%d %H:%M")
        echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
        echo "release_date=$release_date" >> "$GITHUB_OUTPUT"

        # 2. 写入动态说明文件 (release.txt)
        echo "### 📒 固件信息" >> release.txt
        echo "- 🎯 固件名称：${{ env.FILE_NAME }}" >> release.txt
        echo "- 💄 固件版本：${{ env.BUILD_VER }}" >> release.txt
        echo "- 🚀 内核版本：${{ env.KERNEL }}" >> release.txt
        echo "- 💻 平台架构：${{ env.PRODUCT_NAME }}" >> release.txt
        echo "- 🌐 默认地址：${{ env.LAN_IP }}" >> release.txt
        echo "- 🧑‍💼 默认账号：root" >> release.txt
        echo "- 🔑 默认密码：无密码" >> release.txt
        echo "- 📅 编译时间：$release_date" >> release.txt
        echo "----------------------------------------" >> release.txt
        echo "- ⚽ 编译日志请查看 Actions 构建详情" >> release.txt
        
        echo "status=success" >> "$GITHUB_OUTPUT"
    - name: 上传固件至Release
      uses: softprops/action-gh-release@v3
      if: ${{ env.UPLOAD_RELEASE == 'true' && steps.tag.outputs.status == 'success' && !cancelled() }}
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      with:
        # 使用动态生成的标签（例如 Lede-2026.04.06-19.30）
        name: ${{ env.FILE_NAME }}-${{ steps.tag.outputs.release_tag }}
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    # 重点 1：根据输入的 keep_releases 清理 Release
    - name: 清理旧的 Releases 记录
      uses: dev-drprasad/delete-older-releases@v0.3.4
      if: always()
      with:
        keep_latest: ${{ github.event.inputs.keep_releases || '3' }}
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    # 重点 2：根据输入的 keep_workflows 清理 Workflow
    - name: 清理旧的 Workflows 运行记录
      uses: Mattraks/delete-workflow-runs@v2
      if: always()
      with:
        token: ${{ secrets.GH_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: ${{ github.event.inputs.keep_workflows || '10' }}
        
    # 清理旧缓存，保留最新 N 个
    - name: 清理旧的 Caches
      # 即使编译失败也执行清理，除非任务被取消
      if: (!cancelled())
      run: |
        # 设置保留数量：优先使用输入值，若为空（如定时触发）则默认保留 1 个
        KEEP_NUM=${{ github.event.inputs.keep_caches || '1' }}
        
        echo "正在检查缓存管理 (当前设定保留: $KEEP_NUM)..."
        
        # 获取需要删除的缓存 ID 列表
        # 逻辑：按创建时间倒序排列，跳过前 $KEEP_NUM 个，提取剩余 ID
        ids=$(gh cache list --limit 100 --order desc --json id -q ".[$KEEP_NUM:][].id")
        
        if [ -z "$ids" ]; then
          echo "✅ 没有需要清理的旧缓存。"
        else
          echo "🧹 发现旧缓存，准备删除..."
          for id in $ids; do
            gh cache delete $id
            echo "已删除缓存 ID: $id"
          done
          echo "✅ 清理完毕。"
        fi
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: 编译成功，发Telegram通知
      if: success() && env.TELEGRAM_WORK_PUSH == 'true'
      run: |
        MESSAGE="♨️【${{ env.FILE_NAME }}】固件编译完成
        🎯 固件名称: ${{ env.FILE_NAME }}
        💻 平台架构: ${{ env.PRODUCT_NAME }}
        🧱 固件源码: ${{ env.REPO_URL }}
        🌿 源码分支: ${{ env.REPO_BRANCH }}
        🌐 默认地址: ${{ env.LAN_IP }}
        👤 用户名: root
        🔑 密码: 无
        📦 下载地址: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.release_tag }}"
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_TO }}" \
          -d text="$MESSAGE" \
          -d disable_web_page_preview=true

    - name: 编译成功，发企业微信通知
      if: success() && env.WECHAT_WORK_PUSH == 'true'
      run: |
        CONTENT="♨️【${{ env.FILE_NAME }}】固件编译完成
        🎯 固件名称: ${{ env.FILE_NAME }}
        💻 平台架构: ${{ env.PRODUCT_NAME }}
        🧱 固件源码: ${{ env.REPO_URL }}
        🌿 源码分支: ${{ env.REPO_BRANCH }}
        🌐 默认地址: ${{ env.LAN_IP }}
        👤 用户名: root
        🔑 密码: 无
        📦 下载地址: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.release_tag }}"
        curl -X POST "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ secrets.WEBHOOK_SEND_KEY }}" \
          -H "Content-Type: application/json" \
          -d "$(jq -n --arg content "$CONTENT" '{msgtype: "text", text: {content: $content}}')"    
